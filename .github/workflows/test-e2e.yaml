name: Playwright E2E tests

on:
  workflow_dispatch:
    inputs:
      full_render:
        description: 'Include @full-render tests (all seasons)'
        type: boolean
        default: false
  pull_request:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'frontend/**'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
        working-directory: frontend

      - name: Run E2E tests
        run: npx playwright test --grep-invert @full-render
        working-directory: frontend

      - name: Run full-render tests
        if: github.event_name == 'workflow_dispatch' && inputs.full_render
        run: npx playwright test --grep @full-render
        working-directory: frontend

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
